name: langlang_shangkou

services:
  web:
    build: .
    container_name: langlang_shangkou
    ports:
      - "8010:8010"
    volumes:
      # 持久化 SQLite 数据库和上传文件
      - ./data:/app/data
      # 动态映射 .env，修改后无需重建镜像，restart 即可生效
      - ./.env:/app/.env:ro
      # 大体积视频资源通过 volume 挂载，避免进入 Docker 构建上下文
      - ./app/static/resource/words:/app/static/resource/words:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # 提升 Linux 兼容性：将 host.docker.internal 解析到宿主机网关
    extra_hosts:
      # Windows Docker Desktop: 将 host.docker.internal 强制指向宿主机实际 IP
      # 避免 Docker DNS 缓存过期 IP
      - "host.docker.internal:192.168.1.110"
